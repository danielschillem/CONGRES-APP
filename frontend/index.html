<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Congrès Scientifique</title>
    <meta name="description" content="Plateforme de gestion de congrès scientifiques - soumissions, inscriptions, programme et actes." />
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Congrès Scientifique" />
    <meta property="og:description" content="Plateforme de gestion de congrès scientifiques - soumissions, inscriptions, programme et actes." />
    <meta property="og:locale" content="fr_FR" />

    <!-- PWA -->
    <meta name="theme-color" content="#0891b2" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/vite.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme bootstrap: light is the default, dark only when explicitly selected. -->
    <script>
      (function () {
        var theme = localStorage.getItem('ui-theme')
        if (theme === 'dark') {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
